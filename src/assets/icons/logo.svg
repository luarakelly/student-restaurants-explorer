<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <path id="topArc" d="M 80,80 m -62,0 a 62,62 0 0,1 124,0"/>
    <path id="bottomArc" d="M 80,80 m -50,38 a 62,62 0 0,0 100,0"/>
  </defs>

  <!-- Main circle -->
  <circle cx="80" cy="80" r="44" fill="none" stroke="#111" stroke-width="1.8"/>

  <!-- Fork -->
  <line x1="67" y1="56" x2="67" y2="104" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="67" y1="56" x2="67" y2="70" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="61" y1="56" x2="61" y2="70" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="73" y1="56" x2="73" y2="70" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M61,70 Q67,77 73,70" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Knife -->
  <line x1="93" y1="56" x2="93" y2="104" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M93,56 Q102,70 93,78" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Curved text top: STUDENT RESTAURANT -->
  <text font-family="sans-serif" font-size="11" font-weight="500" fill="#111" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">STUDENT RESTAURANT</textPath>
  </text>

  <!-- Curved text bottom: EXPLORER -->
  <text font-family="sans-serif" font-size="11" font-weight="500" fill="#111" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EXPLORER</textPath>
  </text>
</svg>
